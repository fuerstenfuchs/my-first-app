<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptDB</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=cabinet-grotesk@700,800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#171614;--s1:#1f1e1b;--s2:#252420;--s3:#2d2c28;
  --border:#333128;--border2:#3d3b35;
  --t1:#e8e4dc;--t2:#b8b4ac;--t3:#6a6760;
  --accent:#4f98a3;--accent-h:#5fb0bc;--accent-dim:rgba(79,152,163,.15);
  --red:#c4534a;--green:#6ab187;--yellow:#c4b25a;
  --r:10px;--rs:6px;--sidebar:220px;--panel:500px;
  --font-head:'Cabinet Grotesk',sans-serif;
  --font-body:'Satoshi',sans-serif;
}
[data-theme=light]{
  --bg:#f5f3ef;--s1:#fff;--s2:#f0ede8;--s3:#e8e4de;
  --border:#dedad4;--border2:#ccc9c2;
  --t1:#1f1e1b;--t2:#4a4845;--t3:#8a8782;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font-body);background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5}
h1,h2,h3,h4{font-family:var(--font-head);font-weight:800;letter-spacing:-.02em}
input,textarea,select{font-family:var(--font-body);font-size:14px;color:var(--t1);background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px;outline:none;width:100%;transition:border .15s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
select option{background:var(--s2)}
button{font-family:var(--font-body);cursor:pointer;border:none;outline:none;transition:all .15s}
a{color:var(--accent);text-decoration:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .2s}
.sidebar.collapsed{width:56px;min-width:56px}
.sidebar-logo{padding:16px 14px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sidebar-logo .logo-icon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sidebar-logo .logo-text{font-family:var(--font-head);font-weight:800;font-size:16px;white-space:nowrap;overflow:hidden}
.sidebar-logo .logo-text span{color:var(--accent)}
.sidebar-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--rs);cursor:pointer;color:var(--t2);transition:all .15s;white-space:nowrap;overflow:hidden}
.nav-item:hover{background:var(--s2);color:var(--t1)}
.nav-item.active{background:var(--accent-dim);color:var(--accent)}
.nav-item lucide-icon,.nav-item svg{width:16px;height:16px;flex-shrink:0}
.nav-label{font-size:13.5px;font-weight:500}
.nav-count{margin-left:auto;background:var(--s3);color:var(--t3);font-size:11px;padding:1px 6px;border-radius:20px}
.sidebar-footer{padding:10px 8px;border-top:1px solid var(--border)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.main-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg)}
.main-header h2{font-size:18px;flex:1}
.main-content{flex:1;overflow-y:auto;padding:20px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rs);font-size:13.5px;font-weight:500}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-h)}
.btn-ghost{background:transparent;color:var(--t2)}
.btn-ghost:hover{background:var(--s2);color:var(--t1)}
.btn-surface{background:var(--s2);color:var(--t1);border:1px solid var(--border)}
.btn-surface:hover{background:var(--s3);border-color:var(--border2)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#d45f56}
.btn-sm{padding:5px 10px;font-size:12.5px}
.btn-icon{padding:6px;border-radius:var(--rs)}
.btn svg{width:14px;height:14px}

/* Search & Filters */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--t3);pointer-events:none}
.search-wrap input{padding-left:34px}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;background:var(--s2);border:1px solid var(--border);color:var(--t2)}
.chip .chip-remove{cursor:pointer;color:var(--t3);display:flex}
.chip .chip-remove:hover{color:var(--t1)}
.chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

/* Grid */
.prompt-grid{columns:3;column-gap:14px}
@media(max-width:1100px){.prompt-grid{columns:2}}
@media(max-width:700px){.prompt-grid{columns:1}}

/* Prompt Card */
.prompt-card{break-inside:avoid;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;cursor:pointer;transition:border-color .15s,box-shadow .15s;overflow:hidden;position:relative}
.prompt-card:hover{border-color:var(--border2);box-shadow:0 4px 20px rgba(0,0,0,.15)}
.card-color-bar{height:3px;width:100%}
.label-teal .card-color-bar{background:#4f98a3}
.label-purple .card-color-bar{background:#9b8ac4}
.label-orange .card-color-bar{background:#e8925a}
.label-green .card-color-bar{background:#6ab187}
.label-pink .card-color-bar{background:#c4718a}
.label-yellow .card-color-bar{background:#c4b25a}
.label-none .card-color-bar{background:transparent}
.card-body{padding:12px 14px}
.card-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.card-title{font-family:var(--font-head);font-size:14px;font-weight:700;flex:1;line-height:1.3}
.card-fav{color:var(--t3);display:flex;flex-shrink:0}
.card-fav.on{color:#f59e0b}
.card-fav svg{width:14px;height:14px}
.card-preview{font-size:12.5px;color:var(--t2);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tool-badge{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--s3);color:var(--t2);font-weight:500}
.tag-chip{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--accent-dim);color:var(--accent)}
.var-badge{font-size:11px;padding:2px 7px;border-radius:20px;background:rgba(196,178,90,.15);color:#c4b25a;font-weight:600}
.card-footer{border-top:1px solid var(--border);overflow:hidden}
.card-footer-meta{padding:7px 14px;display:flex;align-items:center;gap:8px}
.stars{display:flex;gap:2px;color:#f59e0b;font-size:12px}
.stars .empty{color:var(--s3)}
.usage{font-size:11px;color:var(--t3);margin-left:auto;display:flex;align-items:center;gap:3px}
.copy-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;padding:9px 14px;background:var(--s2);border:none;border-top:1px solid var(--border);color:var(--t2);font-size:13px;font-weight:600;font-family:var(--font-body);cursor:pointer;transition:background .15s,color .15s}
.copy-btn:hover{background:var(--accent);color:#fff}
.copy-btn svg{width:14px;height:14px;flex-shrink:0}

/* Detail Panel */
.detail-panel{position:fixed;top:0;right:0;width:var(--panel);max-width:100vw;height:100vh;background:var(--s1);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;z-index:200;overflow:hidden}
.detail-panel.open{transform:translateX(0)}
.panel-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.panel-header h3{flex:1;font-size:16px}
.panel-actions{display:flex;gap:6px}
.panel-body{flex:1;overflow-y:auto;padding:18px}
.panel-section{margin-bottom:20px}
.panel-section label{font-size:12px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px}
.panel-content{background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:12px;font-size:13.5px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199;opacity:0;pointer-events:none;transition:opacity .25s}
.panel-overlay.open{opacity:1;pointer-events:all}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:14px;width:100%;max-width:600px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;transform:scale(.96);transition:transform .2s}
.modal-overlay.open .modal{transform:scale(1)}
.modal-sm{max-width:420px}
.modal-lg{max-width:760px}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.modal-header h3{flex:1;font-size:16px}
.modal-body{flex:1;overflow-y:auto;padding:20px}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12.5px;font-weight:600;color:var(--t2);margin-bottom:5px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.color-picker{display:flex;gap:8px;flex-wrap:wrap}
.color-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s}
.color-dot:hover{transform:scale(1.1)}
.color-dot.selected{border-color:var(--t1)}
.stars-input{display:flex;gap:4px}
.stars-input span{font-size:22px;cursor:pointer;line-height:1;color:var(--s3)}
.stars-input span.on{color:#f59e0b}

/* Command Palette */
.cmd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;display:flex;align-items:flex-start;justify-content:center;padding-top:15vh;opacity:0;pointer-events:none;transition:opacity .15s}
.cmd-overlay.open{opacity:1;pointer-events:all}
.cmd-palette{background:var(--s1);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:560px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.cmd-input-wrap{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border)}
.cmd-input-wrap svg{color:var(--t3);flex-shrink:0;width:16px;height:16px}
.cmd-input{background:transparent;border:none;font-size:15px;flex:1;color:var(--t1)}
.cmd-input:focus{outline:none}
.cmd-results{max-height:400px;overflow-y:auto}
.cmd-section{padding:8px 0}
.cmd-section-label{padding:4px 14px;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.cmd-item{padding:9px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;color:var(--t2)}
.cmd-item:hover,.cmd-item.focused{background:var(--s2);color:var(--t1)}
.cmd-item svg{width:14px;height:14px;flex-shrink:0}
.cmd-item-title{flex:1;font-size:13.5px}
.cmd-item-meta{font-size:11.5px;color:var(--t3)}
.cmd-empty{padding:32px;text-align:center;color:var(--t3)}

/* Toast */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--s2);border:1px solid var(--border2);border-radius:var(--rs);padding:10px 14px;font-size:13px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.2);animation:toastIn .2s ease;max-width:300px}
.toast svg{width:14px;height:14px;flex-shrink:0}
.toast.success svg{color:var(--green)}
.toast.error svg{color:var(--red)}
.toast.info svg{color:var(--accent)}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(8px)}}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.stat-card .stat-val{font-family:var(--font-head);font-size:28px;font-weight:800;color:var(--accent)}
.stat-card .stat-label{font-size:12.5px;color:var(--t3);margin-top:2px}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-item{display:flex;align-items:center;gap:10px;font-size:12.5px}
.bar-item .bar-label{width:90px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-item .bar-track{flex:1;height:8px;background:var(--s2);border-radius:4px;overflow:hidden}
.bar-item .bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s}
.bar-item .bar-val{width:28px;text-align:right;color:var(--t3)}

/* Collections */
.collection-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;cursor:pointer;transition:border-color .15s}
.collection-card:hover{border-color:var(--border2)}
.collection-card h3{font-size:15px;margin-bottom:4px}
.collection-card .cc-meta{font-size:12.5px;color:var(--t3);display:flex;align-items:center;gap:10px}
.workflow-step{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.workflow-step:last-child{border-bottom:none}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--accent-dim);color:var(--accent);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-info{flex:1}
.step-title{font-weight:600;font-size:13.5px}
.step-tool{font-size:11.5px;color:var(--t3)}
.step-actions{display:flex;gap:4px}

/* Version History */
.history-entry{border:1px solid var(--border);border-radius:var(--rs);margin-bottom:10px;overflow:hidden}
.history-header{padding:10px 12px;background:var(--s2);display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--t2)}
.history-content{padding:12px;font-size:12.5px;line-height:1.7;white-space:pre-wrap;word-break:break-word;color:var(--t2);max-height:180px;overflow-y:auto}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--t3)}
.empty svg{width:40px;height:40px;margin:0 auto 12px;opacity:.3}
.empty h3{font-size:16px;color:var(--t2);margin-bottom:6px}
.empty p{font-size:13px;margin-bottom:18px}

/* Skeleton */
.skeleton{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:var(--rs)}
@keyframes shimmer{to{background-position:-200% 0}}

/* Settings */
.settings-section{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px}
.settings-section h3{font-size:14px;margin-bottom:14px;color:var(--t2)}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-row label{font-size:13.5px}
.toggle{position:relative;width:40px;height:22px}
.toggle input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;background:var(--s3);border-radius:11px;cursor:pointer;transition:.2s}
.toggle input:checked+.toggle-track{background:var(--accent)}
.toggle-track::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.2s}
.toggle input:checked+.toggle-track::after{transform:translateX(18px)}

/* Mobile */
@media(max-width:768px){
  .sidebar{display:none}
  .bottom-tabs{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--border);z-index:100}
  .bottom-tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;gap:3px;font-size:10px;color:var(--t3);cursor:pointer;border:none;background:transparent}
  .bottom-tab.active{color:var(--accent)}
  .bottom-tab svg{width:20px;height:20px}
  .main-content{padding:14px;padding-bottom:80px}
  .detail-panel{width:100vw}
  .modal{margin:10px}
}
@media(min-width:769px){.bottom-tabs{display:none}}
.drag-over{border:2px dashed var(--accent)!important}

/* Card image */
.card-thumb{width:100%;height:auto;display:block;background:var(--s2);max-height:400px;object-fit:contain}
.card-thumb-wrap{position:relative;overflow:hidden;cursor:zoom-in;background:var(--s2)}
.card-thumb-wrap:hover::after{content:'🔍';position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;font-size:16px;width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;pointer-events:none}
.card-thumb-placeholder{width:100%;aspect-ratio:16/9;background:var(--s2);display:flex;align-items:center;justify-content:center;color:var(--t3)}

/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;cursor:zoom-out}
.lightbox.open{opacity:1;pointer-events:all}
.lightbox img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:6px;box-shadow:0 20px 80px rgba(0,0,0,.6);transform:scale(.96);transition:transform .2s}
.lightbox.open img{transform:scale(1)}
.lightbox-close{position:fixed;top:16px;right:16px;background:rgba(255,255,255,.12);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.lightbox-close:hover{background:rgba(255,255,255,.22)}
.card-description{font-size:12.5px;color:var(--t2);margin-bottom:8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Image upload area in modal */
.img-upload-area{width:100%;aspect-ratio:16/9;background:var(--s2);border:2px dashed var(--border2);border-radius:var(--rs);overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;transition:border-color .15s}
.img-upload-area:hover{border-color:var(--accent)}
.img-upload-area img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.img-upload-area .img-placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--t3);font-size:12.5px;pointer-events:none}
.img-upload-area .img-placeholder svg{width:28px;height:28px;opacity:.4}
.img-remove{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);border:none;border-radius:4px;color:#fff;padding:4px 8px;font-size:11px;cursor:pointer;z-index:1}
.img-remove:hover{background:var(--red)}
</style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <div class="logo-text">Prompt<span>DB</span></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="nav-item btn-ghost" style="width:100%" id="theme-toggle">
        <i data-lucide="sun" style="width:16px;height:16px"></i>
        <span class="nav-label">Heller Modus</span>
      </button>
    </div>
  </aside>

  <main class="main">
    <header class="main-header">
      <button class="btn btn-ghost btn-icon" id="sidebar-toggle" title="Toggle sidebar">
        <i data-lucide="panel-left" style="width:16px;height:16px"></i>
      </button>
      <h2 id="view-title">All Prompts</h2>

// ─── Theme ────────────────────────────────────────────────────────────────
function applyTheme(){
  const t=S.theme==='auto'?(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):S.theme;
  document.documentElement.setAttribute('data-theme',t);
  const btn=document.getElementById('theme-toggle');
  if(btn){
    const isDark=t==='dark';
    btn.innerHTML=`<i data-lucide="${isDark?'sun':'moon'}" style="width:16px;height:16px"></i><span class="nav-label">${isDark?'Heller':'Dunkler'} Modus</span>`;
    if(window.lucide)lucide.createIcons({nodes:[btn]});
  }
}
function toggleTheme(){
  const t=document.documentElement.getAttribute('data-theme');
  S.theme=t==='dark'?'light':'dark';
  localStorage.setItem('theme',S.theme);
  applyTheme();
}

// ─── Toast ────────────────────────────────────────────────────────────────
function toast(msg,type='info',ms=2400){
  const icons={info:'info',success:'check-circle',error:'alert-circle'};
  const c=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<i data-lucide="${icons[type]||'info'}" style="width:14px;height:14px"></i><span>${msg}</span>`;
  c.appendChild(el);
  if(window.lucide)lucide.createIcons({nodes:[el]});
  setTimeout(()=>{el.style.animation='toastOut .2s ease forwards';setTimeout(()=>el.remove(),200);},ms);
}

// ─── Save ─────────────────────────────────────────────────────────────────
const debouncedSave=debounce(async()=>{
  await DB.savePrompts(S.prompts);
  await DB.saveCollections(S.collections);
  const el=document.getElementById('last-saved');
  if(el)el.textContent='Gespeichert '+new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
},500);

// ─── Clipboard ───────────────────────────────────────────────────────────
async function copyText(text){
  try{await navigator.clipboard.writeText(text);return true;}
  catch{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();return true;}
}

// ─── Filter & Sort ───────────────────────────────────────────────────────
function getFiltered(){
  let list=[...S.prompts];
  if(S.view==='favorites')list=list.filter(p=>p.favorite);
  const {tool,category,tags,rating,favoritesOnly}=S.filters;
  if(tool)list=list.filter(p=>p.tool===tool);
  if(category)list=list.filter(p=>p.category&&p.category.toLowerCase().includes(category.toLowerCase()));
  if(tags.length)list=list.filter(p=>tags.every(t=>p.tags&&p.tags.includes(t)));
  if(rating)list=list.filter(p=>p.rating>=rating);
  if(favoritesOnly)list=list.filter(p=>p.favorite);
  if(S.search&&window.Fuse){
    const fuse=new Fuse(list,{keys:['title','content','tags','notes','category'],threshold:.4});
    list=fuse.search(S.search).map(r=>r.item);
  } else if(S.search){
    const q=S.search.toLowerCase();
    list=list.filter(p=>[p.title,p.content,...(p.tags||[]),p.notes,p.category].join(' ').toLowerCase().includes(q));
  }
  switch(S.sort){
    case'oldest':list.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));break;
    case'used':list.sort((a,b)=>b.usage_count-a.usage_count);break;
    case'rated':list.sort((a,b)=>b.rating-a.rating);break;
    case'alpha':list.sort((a,b)=>a.title.localeCompare(b.title));break;
    default:list.sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at));
  }
  return list;
}

// ─── Render Stars ─────────────────────────────────────────────────────────
function starsHTML(r,sz=12){
  return `<span class="stars" style="font-size:${sz}px">${[1,2,3,4,5].map(i=>`<span class="${i<=r?'':'empty'}">★</span>`).join('')}</span>`;
}

// ─── Prompt Card ─────────────────────────────────────────────────────────
function cardHTML(p){
  const vars=p.variables||[];
  const tags=(p.tags||[]).slice(0,3);
  const hasImg=p.preview_image&&p.preview_image.length>0;
  return`<div class="prompt-card label-${p.color_label||'none'}" data-id="${p.id}">
    ${hasImg
      ?`<div class="card-thumb-wrap" data-lightbox="${p.preview_image}"><img class="card-thumb" src="${p.preview_image}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-thumb-placeholder><svg width=24 height=24 fill=none stroke=currentColor stroke-width=1.5 viewBox=&quot;0 0 24 24&quot;><path d=&quot;M2 8.5A2.5 2.5 0 014.5 6h15A2.5 2.5 0 0122 8.5v8A2.5 2.5 0 0119.5 19h-15A2.5 2.5 0 012 16.5z&quot;/><path d=&quot;m2 13 4-4 4 4 4-5 5 5&quot;/></svg></div>'"></div>`
      :'<div class="card-color-bar"></div>'}
    <div class="card-body">
      <div class="card-header">
        <div class="card-title">${escape(p.title)}</div>
        <span class="card-fav ${p.favorite?'on':''}" data-fav="${p.id}" title="Favorite">★</span>
      </div>
      ${p.description?`<div class="card-description">${escape(p.description)}</div>`:!hasImg?`<div class="card-preview" style="color:var(--t3)">${escape(p.content)}</div>`:''}
      <div class="card-meta">
        ${p.tool?`<span class="tool-badge">${escape(p.tool)}</span>`:''}
        ${tags.map(t=>`<span class="tag-chip">${escape(t)}</span>`).join('')}
        ${vars.length?`<span class="var-badge">{${vars.length}}</span>`:''}
      </div>
    </div>
    <div class="card-footer">
      <div class="card-footer-meta">
        ${starsHTML(p.rating)}
        <span class="usage"><i data-lucide="bar-chart-2" style="width:11px;height:11px"></i>${p.usage_count||0}</span>
      </div>
      <button class="copy-btn" data-copy="${p.id}"><i data-lucide="copy" style="width:14px;height:14px"></i> Prompt kopieren</button>
    </div>
  </div>`;
}

// ─── Lightbox ─────────────────────────────────────────────────────────────
function openLightbox(src){
  document.getElementById('lightbox-img').src=src;

}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');

}

document.getElementById('lightbox-close').addEventListener('click',closeLightbox);

// ─── Nav Config ───────────────────────────────────────────────────────────
const NAV=[
  {id:'all',label:'Alle Prompts',icon:'layout-grid',count:()=>S.prompts.length},
  {id:'favorites',label:'Favoriten',icon:'star',count:()=>S.prompts.filter(p=>p.favorite).length},
  {id:'collections',label:'Sammlungen',icon:'layers',count:()=>S.collections.length},
  {id:'stats',label:'Statistik',icon:'bar-chart-2',count:null},
  {id:'settings',label:'Einstellungen',icon:'settings',count:null},
];

function renderNav(){
  const sidebar=document.getElementById('sidebar-nav');
  const collapsed=document.getElementById('sidebar').classList.contains('collapsed');
  sidebar.innerHTML=NAV.map(n=>{
    const cnt=n.count?n.count():null;
    return`<div class="nav-item ${S.view===n.id||((S.view==='all'||S.view==='favorites')&&n.id===S.view)?'active':''} ${S.view===n.id?'active':''}" data-nav="${n.id}" title="${n.label}">
      <i data-lucide="${n.icon}" style="width:16px;height:16px"></i>
      <span class="nav-label">${n.label}</span>
      ${cnt!==null&&!collapsed?`<span class="nav-count">${cnt}</span>`:''}
    </div>`;
  }).join('');
  const btabs=document.getElementById('bottom-tabs');
  btabs.innerHTML=NAV.slice(0,5).map(n=>`<button class="bottom-tab ${S.view===n.id?'active':''}" data-nav="${n.id}"><i data-lucide="${n.icon}" style="width:20px;height:20px"></i><span>${n.label}</span></button>`).join('');
  if(window.lucide)lucide.createIcons({nodes:[sidebar,btabs]});
}

// ─── Render ───────────────────────────────────────────────────────────────
function render(){
  renderNav();
  const titles={all:'Alle Prompts',favorites:'Favoriten',collections:S.activeColId?(S.collections.find(c=>c.id===S.activeColId)||{name:'Sammlung'}).name:'Sammlungen',stats:'Statistik',settings:'Einstellungen'};
  document.getElementById('view-title').textContent=titles[S.view]||'PromptDB';
  const vc=document.getElementById('view-container');
  let html='';
  if(S.view==='all'||S.view==='favorites')html=renderAllView();
  else if(S.view==='collections')html=renderCollectionsView();
  else if(S.view==='stats')html=renderStatsView();
  else if(S.view==='settings')html=renderSettingsView();
  vc.innerHTML=html;
  if(window.lucide)lucide.createIcons({nodes:[vc]});
  bindViewEvents();
}

function bindViewEvents(){
  // Search
  const si=document.getElementById('search-input');
  if(si)si.addEventListener('input',e=>{S.search=e.target.value;render();});
  // Filters
  const ft=document.getElementById('filter-tool');if(ft)ft.addEventListener('change',e=>{S.filters.tool=e.target.value;render();});
  const fc=document.getElementById('filter-cat');if(fc)fc.addEventListener('change',e=>{S.filters.category=e.target.value;render();});
  const fr=document.getElementById('filter-rating');if(fr)fr.addEventListener('change',e=>{S.filters.rating=+e.target.value;render();});
  const ss=document.getElementById('sort-select');if(ss)ss.addEventListener('change',e=>{S.sort=e.target.value;render();});
  const fb=document.getElementById('fav-filter-btn');if(fb)fb.addEventListener('click',()=>{S.filters.favoritesOnly=!S.filters.favoritesOnly;render();});
  // Chip removal
  document.querySelectorAll('.chip-remove').forEach(b=>{
    b.addEventListener('click',e=>{
      e.stopPropagation();
      const key=b.dataset.remove,val=b.dataset.val;
      if(key==='tag')S.filters.tags=S.filters.tags.filter(t=>t!==val);
      else if(key==='favoritesOnly')S.filters.favoritesOnly=false;
      else if(key==='rating')S.filters.rating=0;
      else S.filters[key]='';
      render();
    });
  });
  // Card click
  document.querySelectorAll('.prompt-card').forEach(c=>{
    c.addEventListener('click',e=>{
      if(e.target.closest('[data-fav]')||e.target.closest('[data-copy]'))return;
      openPanel(c.dataset.id);
    });
  });
  // Fav toggle on card
  document.querySelectorAll('[data-fav]').forEach(b=>{
    b.addEventListener('click',e=>{e.stopPropagation();toggleFav(b.dataset.fav);});
  });
  // Copy on card
  document.querySelectorAll('[data-copy]').forEach(b=>{
    b.addEventListener('click',e=>{e.stopPropagation();copyPrompt(b.dataset.copy);});
  });
  // Empty CTAs
  const enb=document.getElementById('empty-new-btn');if(enb)enb.addEventListener('click',()=>openEditModal());
  const ecb=document.getElementById('empty-col-btn');if(ecb)ecb.addEventListener('click',()=>openCollectionModal());
  // New collection
  const ncb=document.getElementById('new-col-btn');if(ncb)ncb.addEventListener('click',()=>openCollectionModal());
  // Collection card click
  document.querySelectorAll('[data-col-id]').forEach(c=>{
    c.addEventListener('click',e=>{
      if(e.target.closest('#edit-col-btn')||e.target.closest('#del-col-btn'))return;
      const id=c.dataset.colId||c.closest('[data-col-id]')?.dataset.colId;
      if(id){S.activeColId=id;render();}
    });
  });
  // Back from collection
  const bcb=document.getElementById('back-collections');if(bcb)bcb.addEventListener('click',()=>{S.activeColId=null;render();});
  // Edit collection
  const ecBtn=document.getElementById('edit-col-btn');if(ecBtn)ecBtn.addEventListener('click',e=>{e.stopPropagation();openCollectionModal(e.currentTarget.dataset.colId);});
  // Delete collection
  const dcBtn=document.getElementById('del-col-btn');if(dcBtn)dcBtn.addEventListener('click',e=>{e.stopPropagation();deleteCollection(e.currentTarget.dataset.colId);});
  // Add to collection
  const atcb=document.getElementById('add-to-col-btn');
  if(atcb)atcb.addEventListener('click',()=>{
    const sel=document.getElementById('add-to-col-select');
    if(!sel.value)return;
    const col=S.collections.find(c=>c.id===S.activeColId);
    if(col&&!col.promptIds.includes(sel.value)){col.promptIds.push(sel.value);debouncedSave();render();}
  });
  // Copy all in collection
  const cacb=document.getElementById('copy-all-col-btn');
  if(cacb)cacb.addEventListener('click',async()=>{
    const col=S.collections.find(c=>c.id===S.activeColId);
    if(!col)return;
    const texts=col.promptIds.map(id=>S.prompts.find(p=>p.id===id)).filter(Boolean).map((p,i)=>`--- Step ${i+1}: ${p.title} ---\n${p.content}`).join('\n\n');
    await copyText(texts);toast('Alle Schritte kopiert','success');
  });
  // Remove from collection
  document.querySelectorAll('[data-step-remove]').forEach(b=>{
    b.addEventListener('click',e=>{e.stopPropagation();
      const col=S.collections.find(c=>c.id===S.activeColId);
      if(col){col.promptIds=col.promptIds.filter(id=>id!==b.dataset.stepRemove);debouncedSave();render();}
    });
  });
  // Copy step
  document.querySelectorAll('[data-step-copy]').forEach(b=>{
    b.addEventListener('click',e=>{e.stopPropagation();copyPrompt(b.dataset.stepCopy);});
  });
  // Settings
  document.querySelectorAll('[data-theme-set]').forEach(b=>{
    b.addEventListener('click',()=>{S.theme=b.dataset.themeSet;localStorage.setItem('theme',S.theme);applyTheme();render();});
  });
  const ejb=document.getElementById('export-json-btn');if(ejb)ejb.addEventListener('click',()=>exportJSON(S.prompts));
  const efb=document.getElementById('export-filtered-btn');if(efb)efb.addEventListener('click',()=>exportJSON(getFiltered()));

// ─── Drag & Drop for Collections ─────────────────────────────────────────
let dragSrc=null;
function setupDrag(){
  const steps=document.querySelectorAll('.workflow-step[draggable]');
  steps.forEach(el=>{
    el.addEventListener('dragstart',e=>{dragSrc=el;el.style.opacity='.4';});
    el.addEventListener('dragend',()=>{dragSrc=null;steps.forEach(s=>{s.style.opacity='1';s.classList.remove('drag-over');});});
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
    el.addEventListener('drop',e=>{
      e.preventDefault();el.classList.remove('drag-over');
      if(!dragSrc||dragSrc===el)return;
      const col=S.collections.find(c=>c.id===S.activeColId);if(!col)return;
      const fromId=dragSrc.dataset.stepId,toId=el.dataset.stepId;
      const fi=col.promptIds.indexOf(fromId),ti=col.promptIds.indexOf(toId);
      if(fi<0||ti<0)return;
      col.promptIds.splice(fi,1);col.promptIds.splice(ti,0,fromId);
      debouncedSave();render();
    });
  });
}

// ─── Import / Export ──────────────────────────────────────────────────────
function exportJSON(prompts){
  const data=JSON.stringify({prompts,collections:S.collections,exported_at:now()},null,2);
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));
  a.download=`promptdb-export-${new Date().toISOString().slice(0,10)}.json`;a.click();
  toast('Export heruntergeladen','success');
}
function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      const ps=data.prompts||[];const cs=data.collections||[];
      const existingIds=new Set(S.prompts.map(p=>p.id));
      const newPrompts=ps.filter(p=>!existingIds.has(p.id));
      S.prompts=[...S.prompts,...newPrompts];
      const existingColIds=new Set(S.collections.map(c=>c.id));
      const newCols=cs.filter(c=>!existingColIds.has(c.id));
      S.collections=[...S.collections,...newCols];
      await debouncedSave();render();
      toast(`${newPrompts.length} Prompts, ${newCols.length} Sammlungen importiert`,'success');
    }catch{toast('Ungültige JSON-Datei','error');}
  };
  reader.readAsText(file);
  e.target.value='';
}

const ACTIONS=[
  {label:'Neuer Prompt',icon:'plus',action:()=>{closeCmd();openEditModal();}},
  {label:'Neue Sammlung',icon:'layers',action:()=>{closeCmd();S.view='collections';S.activeColId=null;render();openCollectionModal();}},
  {label:'JSON exportieren',icon:'download',action:()=>{closeCmd();exportJSON(S.prompts);}},
  {label:'Alle Prompts',icon:'layout-grid',action:()=>{closeCmd();S.view='all';render();}},

  {label:'Statistik',icon:'bar-chart-2',action:()=>{closeCmd();S.view='stats';render();}},
  {label:'Einstellungen',icon:'settings',action:()=>{closeCmd();S.view='settings';render();}},
  {label:'Theme wechseln',icon:'sun',action:()=>{closeCmd();toggleTheme();}},
];

function renderCmd(q){
  const res=document.getElementById('cmd-results');
  const ql=q.toLowerCase();
  let html='';
  const matchedActions=ACTIONS.filter(a=>!q||a.label.toLowerCase().includes(ql));
  if(matchedActions.length){
    html+=`<div class="cmd-section"><div class="cmd-section-label">Aktionen</div>${matchedActions.map((a,i)=>`<div class="cmd-item" data-cmd-action="${i}"><i data-lucide="${a.icon}" style="width:14px;height:14px"></i><span class="cmd-item-title">${a.label}</span></div>`).join('')}</div>`;
  }
  let matchedPrompts=S.prompts;
  if(q&&window.Fuse){matchedPrompts=new Fuse(S.prompts,{keys:['title','content','tags'],threshold:.4}).search(q).map(r=>r.item);}
  else if(q){matchedPrompts=S.prompts.filter(p=>p.title.toLowerCase().includes(ql)||p.content.toLowerCase().includes(ql));}
  matchedPrompts=matchedPrompts.slice(0,8);
  if(matchedPrompts.length){
    html+=`<div class="cmd-section"><div class="cmd-section-label">Prompts</div>${matchedPrompts.map(p=>`<div class="cmd-item" data-cmd-prompt="${p.id}"><i data-lucide="file-text" style="width:14px;height:14px"></i><span class="cmd-item-title">${escape(p.title)}</span><span class="cmd-item-meta">${p.tool||''}</span></div>`).join('')}</div>`;
  }
  if(!matchedActions.length&&!matchedPrompts.length)html=`<div class="cmd-empty">Keine Ergebnisse für „${escape(q)}"</div>`;
  res.innerHTML=html;
  if(window.lucide)lucide.createIcons({nodes:[res]});
  res.querySelectorAll('[data-cmd-action]').forEach(el=>{
    el.addEventListener('click',()=>ACTIONS[+el.dataset.cmdAction].action());
  });
  res.querySelectorAll('[data-cmd-prompt]').forEach(el=>{
    el.addEventListener('click',()=>{closeCmd();openPanel(el.dataset.cmdPrompt);});
  });
}

// ─── Keyboard Shortcuts ───────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const tag=document.activeElement.tagName;
  const typing=tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT';
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openCmd();return;}
  if(e.key==='Escape'){
    if(document.getElementById('lightbox').classList.contains('open')){closeLightbox();return;}
    if(document.getElementById('cmd-palette').classList.contains('open')){closeCmd();return;}
    if(document.querySelector('.modal-overlay.open')){document.querySelectorAll('.modal-overlay.open').forEach(m=>closeModal(m.id));return;}
    closePanel();return;
  }
  if(typing)return;
  if(e.key==='n'||e.key==='N'){openEditModal();}
  if(e.key==='e'||e.key==='E'){if(S.selectedId)openEditModal(S.selectedId);}
  if(e.key==='c'||e.key==='C'){if(S.selectedId)copyPrompt(S.selectedId);}
  if(e.key==='Delete'||e.key==='Backspace'){if(S.selectedId)deletePrompt(S.selectedId);}
});

// ─── Header Buttons ───────────────────────────────────────────────────────
document.getElementById('new-prompt-btn').addEventListener('click',()=>openEditModal());
document.getElementById('cmd-btn').addEventListener('click',()=>openCmd());
document.getElementById('theme-toggle').addEventListener('click',toggleTheme);
document.getElementById('sidebar-toggle').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.toggle('collapsed');
});
document.getElementById('panel-close').addEventListener('click',closePanel);
document.getElementById('panel-overlay').addEventListener('click',closePanel);

// Nav
document.addEventListener('click',e=>{
  const nav=e.target.closest('[data-nav]');
  if(nav){S.view=nav.dataset.nav;S.activeColId=null;render();}
});

// ─── Init ─────────────────────────────────────────────────────────────────
async function init(){
  applyTheme();
  const data=await DB.load();
  if(data.prompts.length===0&&data.collections.length===0){
    // Seed sample data and link collections to prompts
    S.prompts=SAMPLE_PROMPTS;
    const sunoIds=S.prompts.filter(p=>p.tool==='Suno').map(p=>p.id);
    const claudeId=S.prompts.find(p=>p.tool==='Claude')?.id;
    const runwayId=S.prompts.find(p=>p.tool==='Runway')?.id;
    const capCutId=S.prompts.find(p=>p.tool==='CapCut')?.id;
    const mjId=S.prompts.find(p=>p.tool==='MidJourney')?.id;
    const comfyIds=S.prompts.filter(p=>p.tool==='ComfyUI').map(p=>p.id);
    const geminiId=S.prompts.find(p=>p.tool==='Gemini')?.id;
    SAMPLE_COLLECTIONS[0].promptIds=[sunoIds[0],claudeId,runwayId,capCutId].filter(Boolean);
    SAMPLE_COLLECTIONS[1].promptIds=[mjId,...comfyIds,geminiId].filter(Boolean);
    S.collections=SAMPLE_COLLECTIONS;
    await DB.savePrompts(S.prompts);
    await DB.saveCollections(S.collections);
  } else {
    S.prompts=data.prompts;
    S.collections=data.collections;
  }
  render();
}

init();
</script>
